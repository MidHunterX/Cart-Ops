flutter_native_splash:
  color: "#ffffff"
  image: assets/icon/icon.png

  color_dark: "#000000"
  image_dark: assets/icon/icon.png

  #! ANDROID 12+ configuration:
  android_12:
    # 1: center-logo
    image:      assets/splash/cartops_splash.png
    image_dark: assets/splash/cartops_splash.png

    # 2: center-logo background color
    # icon_background_color:      "#2b2b2b"
    # icon_background_color_dark: "#ededed"

    # 4: background color
    # color:      "#ededed"
    # color_dark: "#2b2b2b"

    # 5: branding (wordmark)
    # The branding image dimensions must be 800 x 320 px.
    branding:       assets/splash/cartops_branding_light.png
    branding_dark:  assets/splash/cartops_branding_dark.png
